<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Entrar no Financial Architect</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-surface": "#2d3133",
              "secondary": "#505f76",
              "surface-variant": "#e0e3e5",
              "surface-container-low": "#f2f4f6",
              "on-surface-variant": "#45464d",
              "outline-variant": "#c6c6cd",
              "on-surface": "#191c1e",
              "on-secondary-container": "#54647a",
              "tertiary": "#000000",
              "on-primary-fixed": "#111c2d",
              "tertiary-fixed-dim": "#4edea3",
              "inverse-on-surface": "#eff1f3",
              "secondary-fixed": "#d3e4fe",
              "on-secondary-fixed": "#0b1c30",
              "secondary-fixed-dim": "#b7c8e1",
              "on-primary-fixed-variant": "#3c475a",
              "surface-container-high": "#e6e8ea",
              "secondary-container": "#d0e1fb",
              "on-background": "#191c1e",
              "surface-container-lowest": "#ffffff",
              "primary-container": "#111c2d",
              "on-secondary-fixed-variant": "#38485d",
              "outline": "#76777d",
              "on-primary-container": "#79849a",
              "on-tertiary-fixed-variant": "#005236",
              "on-error-container": "#93000a",
              "on-tertiary": "#ffffff",
              "surface-container-highest": "#e0e3e5",
              "on-primary": "#ffffff",
              "on-tertiary-container": "#009668",
              "primary-fixed-dim": "#bcc7de",
              "background": "#f7f9fb",
              "surface-container": "#eceef0",
              "error": "#ba1a1a",
              "on-tertiary-fixed": "#002113",
              "error-container": "#ffdad6",
              "on-error": "#ffffff",
              "primary-fixed": "#d8e3fb",
              "primary": "#000000",
              "surface-bright": "#f7f9fb",
              "inverse-primary": "#bcc7de",
              "surface-dim": "#d8dadc",
              "tertiary-container": "#002113",
              "surface": "#f7f9fb",
              "surface-tint": "#545f73",
              "tertiary-fixed": "#6ffbbe",
              "on-secondary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
      }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
<!-- Background Decorative Elements -->
<div class="absolute top-0 left-0 w-full h-full -z-10 opacity-30">
<div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-primary-fixed rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-96 h-96 bg-tertiary-fixed-dim rounded-full blur-3xl"></div>
</div>
<div class="w-full max-w-[440px] z-10">
<!-- Branding Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-14 h-14 bg-primary-container rounded-xl shadow-lg mb-6">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="account_balance">account_balance</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface mb-2">
                    Entrar no Financial Architect
                </h1>
<p class="font-body text-on-surface-variant text-sm">
                    Acesse sua conta para gerenciar seu patrimônio com precisão editorial.
                </p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_12px_32px_-4px_rgba(25,28,30,0.06)] p-8 md:p-10">
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4 mb-8">
<button class="flex items-center justify-center gap-3 px-4 py-3 bg-surface-container-low hover:bg-surface-container-high transition-colors rounded-lg font-medium text-sm text-on-surface group">
<img alt="Google" class="w-5 h-5" data-alt="Official Google logo with vibrant colors on a white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDTpnhUT3FSEGaQF_uqJgrg88MtDgCQK3WcDVDlpwikIl_5S4iOktOXX6bX0qMLMrddizMGrxU6RoZ35OBKafD3NTM6DdiyqMjyUyeKmONoa4sFmWjoxrNcQ49BBvc0UJ5RcHBhLtSeJciie7IvVx5hABZzDCQYQsAI92Nv9A5gJP217XkQvwYmW3YP1yF4GMYWKf7OmMIHf2LZdDka4w4pWl4gxp_ZFp16FbfIQmhWyhTaflYt_OjM6VBj0XfXRIQkluqZLH25tDY"/>
<span>Google</span>
</button>
<button class="flex items-center justify-center gap-3 px-4 py-3 bg-surface-container-low hover:bg-surface-container-high transition-colors rounded-lg font-medium text-sm text-on-surface group">
<span class="material-symbols-outlined text-xl" data-icon="terminal">terminal</span>
<span>GitHub</span>
</button>
</div>
<div class="relative flex py-2 items-center mb-8">
<div class="flex-grow border-t border-outline-variant opacity-20"></div>
<span class="flex-shrink mx-4 text-xs font-label uppercase tracking-widest text-outline">Ou use seu e-mail</span>
<div class="flex-grow border-t border-outline-variant opacity-20"></div>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-1.5">
<label class="block text-xs font-label font-semibold text-on-surface-variant uppercase tracking-wider" for="email">E-mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-highest rounded-md border-none focus:ring-2 focus:ring-primary/20 text-sm placeholder:text-outline transition-all" id="email" name="email" placeholder="nome@exemplo.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="block text-xs font-label font-semibold text-on-surface-variant uppercase tracking-wider" for="password">Senha</label>
<a class="text-xs font-medium text-primary hover:underline underline-offset-4 decoration-surface-tint" href="#">Esqueceu a senha?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-3.5 bg-surface-container-highest rounded-md border-none focus:ring-2 focus:ring-primary/20 text-sm placeholder:text-outline transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Error State (Hidden by default, shown for demonstration) -->
<div class="hidden flex items-start gap-3 p-3.5 bg-error-container/50 rounded-lg text-on-error-container text-xs">
<span class="material-symbols-outlined text-lg" data-icon="error">error</span>
<p>Credenciais inválidas. Verifique seus dados e tente novamente.</p>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary py-4 rounded-xl font-headline font-bold text-base shadow-lg hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Entrar</span>
<!-- Loading State Icon (Can be toggled) -->
<span class="material-symbols-outlined animate-spin hidden" data-icon="progress_activity">progress_activity</span>
</button>
</form>
<div class="mt-8 text-center">
<p class="text-sm text-on-surface-variant">
                        Novo por aqui? 
                        <a class="font-semibold text-primary hover:underline underline-offset-4 decoration-surface-tint" href="#">Criar conta</a>
</p>
</div>
</div>
<!-- Footer Links -->
<div class="mt-12 flex justify-center gap-8">
<a class="text-[10px] font-label uppercase tracking-widest text-outline hover:text-on-surface transition-colors" href="#">Privacidade</a>
<a class="text-[10px] font-label uppercase tracking-widest text-outline hover:text-on-surface transition-colors" href="#">Termos</a>
<a class="text-[10px] font-label uppercase tracking-widest text-outline hover:text-on-surface transition-colors" href="#">Suporte</a>
</div>
</div>
</main>
<!-- Bottom Illustration (Mobile hidden or adapted) -->
<div class="hidden lg:block fixed bottom-0 right-0 w-1/3 h-1/2 opacity-10 pointer-events-none">
<img alt="Financial ledger abstraction" class="w-full h-full object-contain object-bottom" data-alt="Abstract minimalist line art representing a financial ledger and growth charts in deep navy blue on a transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuARIXVMZYhM4GwdX-e_GRIdo4H0p4NyOt5o6M7qcasW0tueLOzyWBCiq3rgCMHOsC3-0ROuusC8obzlTEs4dJOq_4EEVTAU73L_zLx2EWDwIMOtLup0PC10tHmSkj_ga-16bR0xgTDvS3QoGRr0f9teqPNbd8e63pUvDaE0I4IbFJIT71uErKUHtWTxRvKAbz0DYyJSrWVqvhVVsjaAzjZVk5oMkhdIw6r6KaDPoUr-yV-yEY0OFlSTjkVwjalTIN2-RMx4wW_vCnU"/>
</div>
</body></html>
