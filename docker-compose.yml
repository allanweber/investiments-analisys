services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: investiments
    ports:
      # Use 5434 on the host if another Postgres already uses 5432 (e.g. another Docker project).
      - '5434:5432'
    volumes:
      - investiments_pg:/var/lib/postgresql/data

volumes:
  investiments_pg:
